<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模块化算力单元 - 视频界面复刻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 393px;
            height: 852px;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 852px;
            margin: 0;
            user-select: none;
        }

        .phone-mockup {
            width: 393px;
            height: 852px;
            border-radius: 55px;
            border: 14px solid #1a1a1a;
            box-shadow: 0 0 0 2px #333, 0 20px 40px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            background-color: #050505;
        }

        .device-side-button {
            display: none;
        }

        #previewVideo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            background: #000;
        }

        #templateBackgroundImage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            background: #000;
        }

        .vm-template-mask-bg {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: .72;
            background:
                linear-gradient(to bottom, rgba(5, 18, 14, .12), rgba(8, 52, 28, .38)),
                repeating-linear-gradient(105deg, rgba(93, 214, 44, .1) 0 2px, transparent 2px 28px);
        }

        .vm-template-mask-bg::before {
            content: "";
            position: absolute;
            inset: 34% 0 0;
            background: rgba(93, 214, 44, .34);
            clip-path: polygon(0 100%, 16% 38%, 28% 100%, 44% 34%, 56% 100%, 72% 32%, 84% 100%, 100% 36%, 100% 100%);
        }

        .vm-template-mask-bg.is-simple-mask::before {
            display: none;
        }

        .bg-overlay {
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.4) 0%,
                rgba(0,0,0,0.0) 25%,
                rgba(0,0,0,0.0) 60%,
                rgba(0,0,0,0.85) 100%
            );
            z-index: 3;
        }

        .text-stroke-yellow {
            color: #FEE74B;
            font-weight: 900;
            text-shadow:
                -2px -2px 0 #000,
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                -3px  0   0 #000,
                 3px  0   0 #000,
                 0   -3px 0 #000,
                 0    3px 0 #000,
                 0    6px 10px rgba(0,0,0,0.6);
            letter-spacing: 1px;
            line-height: 1.25;
        }

        .dynamic-island {
            width: 90px;
            height: 26px;
            background-color: #000;
            border-radius: 15px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        .sound-toggle {
            position: absolute;
            z-index: 60;
            right: 16px;
            top: 108px;
            min-width: 44px;
            min-height: 24px;
            padding: 0 8px;
            border: 1px solid rgba(255,255,255,.22);
            border-radius: 999px;
            color: #fff;
            background: rgba(0,0,0,.42);
            font: 800 11px/1 'Noto Sans SC', sans-serif;
            text-shadow: 0 2px 10px rgba(0,0,0,.8);
            cursor: pointer;
        }

        .status-scale {
            transform: scale(0.75);
            transform-origin: top center;
            width: 133.333333%;
            margin-left: -16.666667%;
        }

        .bottom-action-scale {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%) scale(0.75);
            transform-origin: bottom center;
            width: 500px;
            justify-content: space-between;
            margin-left: 0;
        }

        .bottom-meta {
            position: absolute;
            left: 21px;
            bottom: 64px;
            width: 330px;
            margin-bottom: 0;
        }

        .creator-group {
            transform: translateX(-52px);
        }

        .back-control {
            transform: translateY(-24px);
        }

        .vm-template-layer {
            position: absolute;
            inset: 0;
            z-index: 18;
            overflow: hidden;
        }

        .vm-template-hud-bar {
            position: absolute;
            left: 0;
            width: 100%;
            z-index: 1;
            border-radius: 10px;
            background: rgba(5, 17, 24, .68);
            cursor: move;
            user-select: text;
        }

        .vm-template-text-bar {
            position: absolute;
            left: 0;
            width: 100%;
            z-index: 1;
            border-radius: 10px;
            background: rgba(5, 17, 24, .68);
            cursor: move;
            user-select: none;
        }

        .vm-template-editable.is-editing {
            cursor: text;
        }

        .vm-template-text:focus {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
            background: rgba(0,0,0,.24);
        }

        .vm-template-text {
            position: absolute;
            z-index: 2;
            max-width: 340px;
            color: #fff;
            font-weight: 900;
            line-height: 1.1;
            text-shadow: 0 2px 10px rgba(0,0,0,.76);
            white-space: pre-wrap;
            overflow-wrap: break-word;
            cursor: move;
            user-select: text;
        }

        .vm-template-text.text-effect-pulse {
            transform-origin: center;
            animation: vmTextPulse 1.8s ease-in-out infinite;
        }

        .vm-template-text.text-effect-fade-in {
            animation: vmTextFadeIn .72s ease-out both;
        }

        .vm-template-text.text-effect-fade-out {
            animation: vmTextFadeOut 2.6s ease-in both;
        }

        .vm-template-text.text-effect-fade-in-out {
            animation: vmTextFadeInOut 2.2s ease-in-out infinite;
        }

        .vm-template-text.text-effect-glow {
            animation: vmTextGlow 1.4s ease-in-out infinite alternate;
        }

        .vm-template-text.text-effect-slide-up {
            animation: vmTextSlideUp .72s ease-out both;
        }

        .vm-template-text.text-effect-slide-down {
            animation: vmTextSlideDown .72s ease-out both;
        }

        .vm-template-text.text-effect-slide-left {
            animation: vmTextSlideLeft .72s ease-out both;
        }

        .vm-template-text.text-effect-slide-right {
            animation: vmTextSlideRight .72s ease-out both;
        }

        .vm-template-text.text-effect-shake {
            animation: vmTextShake .72s ease-in-out infinite;
        }

        .vm-template-text.text-effect-blink {
            animation: vmTextBlink .78s steps(2, end) infinite;
        }

        .vm-template-text.text-effect-wave {
            animation: vmTextWave 1.6s ease-in-out infinite;
        }

        .vm-template-text.text-effect-jitter {
            animation: vmTextJitter .22s linear infinite;
        }

        .vm-template-text.text-effect-zoom-in {
            transform-origin: center;
            animation: vmTextZoomIn .74s ease-out both;
        }

        .vm-template-text.text-effect-typewriter {
            overflow: hidden;
            border-right: 2px solid currentColor;
            animation: vmTextType 1.35s steps(var(--text-effect-steps, 24), end) both, vmTextCaret .7s step-end infinite;
        }

        .vm-template-text.text-effect-typewriter.active,
        .vm-template-text.text-effect-typewriter.is-editing {
            border-right: 0;
            animation: none;
        }

        .vm-template-text.text-effect-pop {
            transform-origin: center;
            animation: vmTextPop .82s cubic-bezier(.2, 1.45, .42, 1) both;
        }

        .vm-template-text.text-effect-shadow-pop {
            transform-origin: center;
            animation: vmTextShadowPop .82s cubic-bezier(.2, 1.35, .42, 1) both;
        }

        @keyframes vmTextFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes vmTextFadeOut {
            0%, 35% { opacity: 1; }
            100% { opacity: .12; }
        }

        @keyframes vmTextFadeInOut {
            0%, 100% { opacity: .22; }
            45%, 65% { opacity: 1; }
        }

        @keyframes vmTextPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.045); }
        }

        @keyframes vmTextGlow {
            0% { text-shadow: 0 2px 10px rgba(0,0,0,.76), 0 0 0 rgba(93,214,44,0); }
            100% { text-shadow: 0 2px 10px rgba(0,0,0,.76), 0 0 16px rgba(93,214,44,.92); }
        }

        @keyframes vmTextSlideUp {
            0% { opacity: 0; transform: translateY(18px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes vmTextSlideDown {
            0% { opacity: 0; transform: translateY(-18px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes vmTextSlideLeft {
            0% { opacity: 0; transform: translateX(28px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @keyframes vmTextSlideRight {
            0% { opacity: 0; transform: translateX(-28px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @keyframes vmTextShake {
            0%, 100% { transform: translateX(0); }
            22% { transform: translateX(-2px); }
            44% { transform: translateX(2px); }
            66% { transform: translateX(-1px); }
            88% { transform: translateX(1px); }
        }

        @keyframes vmTextBlink {
            50% { opacity: .2; }
        }

        @keyframes vmTextWave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes vmTextJitter {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            75% { transform: translate(2px, 0); }
        }

        @keyframes vmTextZoomIn {
            0% { opacity: 0; transform: scale(.86); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes vmTextType {
            from { clip-path: inset(0 100% 0 0); }
            to { clip-path: inset(0 0 0 0); }
        }

        @keyframes vmTextCaret {
            50% { border-color: transparent; }
        }

        @keyframes vmTextPop {
            0% { opacity: 0; transform: scale(.84); }
            70% { opacity: 1; transform: scale(1.08); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes vmTextShadowPop {
            0% { opacity: 0; transform: scale(.88); text-shadow: 0 2px 10px rgba(0,0,0,.76), 8px 8px 0 rgba(0,0,0,.55); }
            70% { opacity: 1; transform: scale(1.06); text-shadow: 0 2px 10px rgba(0,0,0,.76), 3px 3px 0 rgba(0,0,0,.42); }
            100% { opacity: 1; transform: scale(1); text-shadow: 0 2px 10px rgba(0,0,0,.76); }
        }

        .vm-template-editable.active {
            outline: 2px solid #5dd62c;
            outline-offset: 4px;
        }

        .vm-template-editable.active[data-template-target="sloganBar"],
        .vm-template-editable.active[data-template-target="titleBar"],
        .vm-template-editable.active[data-template-target="hudBar"] {
            outline-color: #ff4053;
            box-shadow: 0 0 0 2px rgba(255, 64, 83, .35);
        }

        .vm-visual-toolbar {
            position: absolute;
            left: 50%;
            bottom: 86px;
            transform: translateX(-50%);
            z-index: 70;
            display: none;
            align-items: center;
            flex-wrap: nowrap;
            gap: 4px;
            max-width: calc(100% - 22px);
            padding: 5px;
            border: 1px solid rgba(93, 214, 44, .5);
            border-radius: 10px;
            background: rgba(0, 0, 0, .72);
            box-shadow: 0 12px 28px rgba(0,0,0,.42);
        }

        .vm-visual-toolbar.active {
            display: none;
        }

        .vm-visual-toolbar button,
        .vm-visual-toolbar select,
        .vm-visual-toolbar input {
            height: 24px;
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 6px;
            color: #fff;
            background: rgba(18,18,18,.92);
            font: 800 10px/1 'Noto Sans SC', sans-serif;
        }

        .vm-visual-toolbar button {
            min-width: 24px;
            padding: 0 6px;
        }

        .vm-visual-toolbar select {
            width: 82px;
        }

        .vm-visual-toolbar input[type="color"] {
            width: 28px;
            padding: 2px;
        }

        .vm-align-btn {
            font-size: 11px;
        }

        .vm-align-btn.active {
            border-color: #5dd62c;
            color: #5dd62c;
            background: rgba(93, 214, 44, .14);
        }

        .vm-center-guides {
            position: absolute;
            inset: 0;
            z-index: 69;
            pointer-events: none;
            display: none;
        }

        .vm-center-guides.active {
            display: block;
        }

        .vm-center-guides::before,
        .vm-center-guides::after {
            content: "";
            position: absolute;
            background: rgba(93, 214, 44, .74);
            box-shadow: 0 0 10px rgba(93,214,44,.45);
        }

        .vm-center-guides::before {
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
        }

        .vm-center-guides::after {
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
        }

        .vm-template-slogan {
            font-weight: 700;
        }

        .vm-template-hud {
            font-weight: 600;
            line-height: 1.25;
        }

        body.cover-profile-mode #previewVideo,
        body.cover-profile-mode .vm-template-mask-bg,
        body.cover-profile-mode .bg-overlay,
        body.cover-profile-mode .vm-template-layer,
        body.cover-profile-mode .status-scale,
        body.cover-profile-mode .back-control,
        body.cover-profile-mode .sound-toggle,
        body.cover-profile-mode .phone-mockup > .relative.z-10 {
            display: none !important;
        }

        body.cover-profile-mode .phone-mockup,
        body.cover-single-mode .phone-mockup {
            border: 14px solid #1a1a1a;
            border-radius: 55px;
            background: #050505;
            box-shadow: 0 0 0 2px #333, 0 20px 40px rgba(0,0,0,0.8);
        }

        body.cover-profile-mode .cover-profile-shell,
        body.cover-single-mode .single-cover-shell {
            border-radius: 41px;
            overflow: hidden;
        }

        body.cover-profile-mode .device-side-button,
        body.cover-single-mode .device-side-button {
            display: none;
        }

        .cover-profile-shell {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            background: #101010;
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
        }

        .single-cover-shell {
            position: absolute;
            inset: 0;
            z-index: 31;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .single-cover-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            z-index: 1;
        }

        .single-cover-gradient {
            position: absolute;
            inset: 0;
            z-index: 2;
            background:
                linear-gradient(to bottom, rgba(0,0,0,.96) 0%, rgba(0,0,0,.92) 18%, rgba(0,0,0,.62) 30%, rgba(0,0,0,.12) 48%, rgba(0,0,0,0) 70%),
                linear-gradient(to right, rgba(0,0,0,.38), rgba(0,0,0,0) 62%);
        }

        .single-cover-logo {
            position: absolute;
            left: 7%;
            top: 13%;
            z-index: 3;
            max-width: 86%;
            color: #fff;
            font-size: 31px;
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: 0;
            text-shadow: 0 3px 16px rgba(0,0,0,.72);
        }

        .single-cover-slogan {
            position: absolute;
            left: 6.8%;
            top: 22%;
            z-index: 3;
            max-width: 86%;
            color: #fff;
            font-size: 23px;
            font-weight: 900;
            line-height: 1.14;
            letter-spacing: 0;
            text-shadow: 0 3px 16px rgba(0,0,0,.72);
            white-space: pre;
            overflow-wrap: normal;
            word-break: keep-all;
        }

        .single-cover-title {
            position: absolute;
            left: 6.8%;
            top: 26.6%;
            z-index: 3;
            max-width: 88%;
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.16;
            letter-spacing: 0;
            text-shadow: 0 3px 16px rgba(0,0,0,.76);
            white-space: pre;
            overflow-wrap: normal;
            word-break: keep-all;
        }

        .cover-status-bar {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
        }

        .cover-status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: .92;
        }

        .cover-status-icons svg {
            display: block;
            color: #fff;
        }

        .cover-island {
            position: absolute;
            left: 50%;
            top: 8px;
            width: 110px;
            height: 30px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: #000;
        }

        .cover-profile-scroll {
            flex: 1;
            overflow: hidden;
            background: #101010;
        }

        .cover-profile-head {
            display: grid;
            grid-template-columns: 76px minmax(0, 1fr);
            gap: 16px;
            padding: 8px 20px 0;
        }

        .cover-avatar {
            width: 76px;
            height: 76px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 50%;
            background: #1c1c1e;
            box-shadow: inset 0 0 18px rgba(0,0,0,.45);
            color: #5dd62c;
            font-size: 20px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 0 0 10px rgba(93, 214, 44, .45);
        }

        .cover-profile-copy {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .cover-profile-editable {
            cursor: move;
            user-select: text;
        }

        .cover-profile-editable.active {
            outline: 2px solid #5dd62c;
            outline-offset: 4px;
            border-radius: 6px;
        }

        .cover-profile-editable.is-editing {
            cursor: text;
        }

        .cover-brand-name {
            color: #fff;
            font-size: 19px;
            font-weight: 500;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .cover-location {
            margin-top: 8px;
            color: #888;
            font-size: 13px;
        }

        .cover-bio {
            position: relative;
            padding: 18px 20px 0;
            color: #ccc;
            font-size: 14px;
            line-height: 1.7;
        }

        #coverProfileHeadline {
            display: block;
            min-height: 4.8em;
            white-space: pre-line;
            line-height: 1.2;
        }

        .cover-expand {
            color: #888;
        }

        .cover-count {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
        }

        .cover-action-row {
            display: flex;
            gap: 12px;
            padding: 18px 20px 18px;
        }

        .cover-action-row button {
            flex: 1;
            display: grid;
            place-items: center;
            min-height: 40px;
            border: 0;
            border-radius: 8px;
            box-shadow: none;
            font-size: 15px;
            font-weight: 700;
        }

        .cover-follow-button {
            color: #000;
            background: #5dd62c;
            text-align: center;
        }

        .cover-message-button {
            color: #fff;
            background: #262628;
        }

        .cover-profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #000;
        }

        .cover-profile-tile {
            position: relative;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            background: #222;
        }

        .cover-profile-tile img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-tile-shade {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.32), transparent);
        }

        .cover-tile-logo,
        .cover-tile-slogan,
        .cover-tile-title {
            position: absolute;
            left: 6.8%;
            z-index: 3;
            max-width: 88%;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,.82);
        }

        .cover-tile-logo {
            display: block;
            top: 13%;
            font-size: 10px;
            font-weight: 900;
            line-height: 1.05;
        }

        .cover-tile-slogan {
            display: block;
            top: 22%;
            font-size: 7px;
            font-weight: 800;
            line-height: 1.12;
            white-space: pre-line;
        }

        .cover-tile-title {
            top: 26.6%;
            font-size: 7px;
            font-weight: 700;
            line-height: 1.15;
        }

        .cover-tile-like {
            position: absolute;
            right: 9px;
            bottom: 10px;
            z-index: 3;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            color: rgba(255,255,255,.9);
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,.75);
        }

        .cover-tile-like svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>
    <div class="relative w-[393px] h-[852px]">
        <div class="device-side-button absolute -left-[4px] top-[115px] w-[5px] h-[26px] bg-[#444] rounded-l-[4px] border border-black shadow-sm z-0"></div>
        <div class="device-side-button absolute -left-[4px] top-[165px] w-[5px] h-[54px] bg-[#444] rounded-l-[4px] border border-black shadow-sm z-0"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const videoPath = params.get("path") || "";

      const soundToggle = document.getElementById("soundToggle");
      const phone = document.querySelector(".phone-mockup");
      const backgroundImage = document.getElementById("templateBackgroundImage");
      const templateMask = document.getElementById("templateMaskBg");
      let currentPayload = templatePayload;
      let activeTarget = "";

      let coverDragging = null;
      let editingTextNode = null;
      let editingCoverNode = null;
      const DRAG_START_THRESHOLD = 5;

        video.src = `/api/video-matrix/preview-file?path=${encodeURIComponent(videoPath)}`;
      } else {
        video.hidden = true;
      }
      video.muted = false;
      video.volume = 1;
      video.play().catch(() => {
        soundToggle.textContent = "Tap for sound";
      });
      soundToggle.addEventListener("click", async () => {
        video.muted = false;
        video.volume = 1;
        await video.play();
        soundToggle.textContent = "Sound on";
      });
      function toggleVideoPlayback() {
        if (video.paused) video.play();
        else video.pause();
      }
      video.addEventListener("click", toggleVideoPlayback);
      phone.addEventListener("click", (event) => {
        if (event.target.closest(".vm-template-layer")) return;
        if (event.target.closest("button")) return;
        toggleVideoPlayback();
      });
      document.addEventListener("click", (event) => {
        if (event.target.closest(".vm-template-layer")) return;
        exitTextEdit();
      });
      applyTemplatePayload(templatePayload);
      initVisualEditor();
      initCoverVisualEditor();

      function decodeTemplatePayload(value) {
        if (!value) return null;
        try {
          return JSON.parse(decodeURIComponent(escape(atob(value))));
        } catch {
          return null;
        }
      }

      function designX(value) {
        return `${Number(value || 0) * 393 / 1080}px`;
      }

      function designY(value) {
        return `${Number(value || 0) * 852 / 1920}px`;
      }

      function designSize(value) {
        return `${Math.max(8, Number(value || 24) * 393 / 1080)}px`;
      }

      function designRadius(value) {
        return `${Math.max(0, Number(value ?? 0) * 393 / 1080)}px`;
      }

      function toDesignX(value) {
        return Math.round(Number(value || 0) * 1080 / 393);
      }

      function toDesignY(value) {
        return Math.round(Number(value || 0) * 1920 / 852);
      }

      function setLayerText(id, visible, value, x, y, size, color) {
        const node = document.getElementById(id);
        node.hidden = !visible;
        if (!visible) return;
        const target = id === "templateTitle" ? "title" : id === "templateSlogan" ? "slogan" : "hud";
        const template = currentPayload?.template || {};
        const alignKey = `${target}_text_align`;
        node.textContent = value || "";
        node.style.left = target === "hud" && template[alignKey] ? "0px" : designX(x);
        node.style.top = designY(y);
        node.style.width = target === "hud" && template[alignKey] ? "100%" : "";
        node.style.maxWidth = target === "hud" && template[alignKey] ? "100%" : "";
        node.style.fontSize = designSize(size);
        node.style.color = color || "#ffffff";
        node.style.fontFamily = template[`${target}_font_family`] || "'Noto Sans SC', sans-serif";
        node.style.textAlign = template[alignKey] || "left";
        applyTextEffect(node, template[`${target}_text_effect`] || "none", value);
      }

      function applyTextEffect(node, effect, text) {
        const effectClasses = [
          "text-effect-fade-in", "text-effect-fade-out", "text-effect-fade-in-out",
          "text-effect-pulse", "text-effect-glow", "text-effect-slide-up",
          "text-effect-slide-down", "text-effect-slide-left", "text-effect-slide-right",
          "text-effect-shake", "text-effect-typewriter", "text-effect-pop",
          "text-effect-blink", "text-effect-wave", "text-effect-jitter",
          "text-effect-zoom-in", "text-effect-shadow-pop",
        ];
        node.classList.remove(...effectClasses);
        node.style.removeProperty("--text-effect-steps");
        const normalized = effect || "none";
        if (normalized === "none") return;
        node.classList.add(`text-effect-${normalized}`);
        node.style.setProperty("--text-effect-steps", Math.max(8, String(text || "").length));
      }

      function applyTemplatePayload(payload) {
        if (!payload) return;
        if (payload.cover_mode) {
          document.body.classList.add("cover-profile-mode");
          applyCoverProfilePayload(payload);
          return;
        }
        document.body.classList.remove("cover-profile-mode");
        document.body.classList.remove("cover-single-mode");
        document.getElementById("coverProfileShell").hidden = true;
        document.getElementById("singleCoverShell").hidden = true;
        const template = payload.template || {};
        backgroundImage.hidden = !payload.background_image_url;
        if (payload.background_image_url) backgroundImage.src = payload.background_image_url;
        applyTemplateMask(templateMask, template, payload.show_template_mask !== false);
        const hudBar = document.getElementById("templateHudBar");
        hudBar.hidden = !template.show_hud;
        if (template.show_hud) {
          hudBar.style.left = designX(template.hud_bar_x || 0);
          hudBar.style.top = designY(template.hud_bar_y);
          hudBar.style.height = designY(template.hud_bar_height || 120);
          hudBar.style.width = designX(template.hud_bar_width || 1080);
          hudBar.style.background = template.hud_bar_color || "rgba(5, 17, 24, .68)";
          hudBar.style.opacity = template.hud_bar_opacity ?? 0.68;
          hudBar.style.borderRadius = designRadius(template.hud_bar_radius ?? 10);
        }
        setTextBar("templateSloganBar", template.show_slogan, template.slogan_bg_x || 0, template.slogan_bg_y ?? template.slogan_y, template.slogan_bg_height || 80, template.slogan_bg_width || 1080, template.slogan_bg_color || template.hud_bar_color, template.slogan_bg_opacity ?? 0.62, template.slogan_bg_radius ?? template.hud_bar_radius ?? 10);
        setTextBar("templateTitleBar", template.show_title, template.title_bg_x || 0, template.title_bg_y ?? template.title_y, template.title_bg_height || template.slogan_bg_height || 92, template.title_bg_width || 1080, template.title_bg_color || template.hud_bar_color, template.title_bg_opacity ?? template.slogan_bg_opacity ?? 0.62, template.title_bg_radius ?? template.hud_bar_radius ?? 10);
        setLayerText("templateSlogan", template.show_slogan, payload.slogan, template.slogan_x, template.slogan_y, template.slogan_font_size, textColorValue("slogan", template));
        setLayerText("templateTitle", template.show_title, payload.title, template.title_x, template.title_y, template.title_font_size, textColorValue("title", template));
        setLayerText("templateHudText", template.show_hud, payload.hud_text, template.hud_x, template.hud_y, template.hud_font_size, textColorValue("hud", template));
      }

      function applyCoverProfilePayload(payload) {
        currentPayload = payload;
        const template = payload.template || {};
        const shell = document.getElementById("coverProfileShell");
        const singleShell = document.getElementById("singleCoverShell");
        if ((template.cover_layout || "profile") === "single_video") {
          document.body.classList.add("cover-single-mode");
          shell.hidden = true;
          renderSingleVideoCover(payload);
          return;
        }
        document.body.classList.remove("cover-single-mode");
        singleShell.hidden = true;
        shell.hidden = false;
        setCoverText("coverProfileBrand", payload.brand || template.profile_brand_text || "GasGx | 燃气发电解决方案", template.brand_font_size || 52, template.primary_color, "brand");
        setCoverText("coverProfileLocation", payload.eyebrow || template.profile_eyebrow_text || "山西 大同", template.eyebrow_font_size || 30, template.secondary_color || "#888888", "eyebrow");
        setCoverText("coverProfileHeadline", formatCoverHeadline(payload.headline || payload.slogan || "全球领先的搁浅天然气算力变现引擎，解锁搁浅燃气能源驱动能源就地变现..."), template.headline_font_size || 38, template.primary_color, "headline");
        setCoverText("coverProfileSubhead", template.profile_subhead_text || "162 条原创内容", template.subhead_font_size || 28, template.secondary_color || "#666666", "subhead");
        setCoverText("coverProfileCta", template.profile_cta_text || "关注", template.cta_font_size || 42, "#000000", "cta");
        renderCoverProfileGrid(payload.background_image_url);
      }

      function renderSingleVideoCover(payload) {
        const template = payload.template || {};
        const shell = document.getElementById("singleCoverShell");
        const background = document.getElementById("singleCoverBackground");
        const imageUrl = payload.background_image_url || (Array.isArray(payload.background_image_urls) ? payload.background_image_urls[0] : "") || "";
        shell.hidden = false;
        background.hidden = !imageUrl;
        if (imageUrl) background.src = imageUrl;
        document.querySelector(".single-cover-gradient").style.background = singleCoverMaskStyle(template);
        setSingleCoverText("singleCoverLogo", template.single_cover_logo_text || "GasGx", template.single_cover_logo_font_size || 84, "singleLogo");
        setSingleCoverText("singleCoverSlogan", template.single_cover_slogan_text || "终结废气 | 重塑能源 | 就地变现", template.single_cover_slogan_font_size || 60, "singleSlogan");
        setSingleCoverText("singleCoverTitle", template.single_cover_title_text || "全球领先的搁浅天然气算力变现引擎", template.single_cover_title_font_size || 54, "singleTitle");
      }

      function setSingleCoverText(id, text, size, target) {
        const node = document.getElementById(id);
        const template = currentPayload?.template || {};
        const align = template[`${target}_text_align`] || "left";
        const offsetY = Number(template[coverTargetOffsetKey(target)] || 0);
        node.textContent = text || "";
        node.style.fontSize = designSize(size || 54);
        node.style.fontFamily = template[`${target}_font_family`] || "'Noto Sans SC', sans-serif";
        node.style.textAlign = align;
        node.style.color = template[`${target}_color`] || "#ffffff";
        node.style.right = "";
        node.style.left = align === "center" ? "50%" : align === "right" ? "auto" : "6.8%";
        if (target === "singleLogo" && align === "left") node.style.left = "7%";
        if (align === "right") node.style.right = "6.8%";
        if (target === "singleSlogan" || target === "singleTitle") {
          node.style.width = "";
          node.style.maxWidth = "none";
        }
        node.style.transform = `${align === "center" ? "translateX(-50%) " : ""}translateY(${offsetY}px)`;
      }

      function applyTemplateMask(node, template, visible) {
        const mode = template.mask_mode || "bottom_gradient";
        node.hidden = !visible || mode === "none";
        if (node.hidden) return;
        const color = normalizeColor(template.mask_color || template.gradient_color || template.tint_color || "#071015");
        const opacity = Math.max(0, Math.min(1, Number(template.mask_opacity ?? template.gradient_opacity ?? template.tint_opacity ?? 0.35)));
        const alphaColor = hexToRgba(color, opacity);
        node.classList.add("is-simple-mask");
        node.style.opacity = "1";
        if (mode === "top_gradient") {
          node.style.background = `linear-gradient(to bottom, ${alphaColor}, rgba(0,0,0,0))`;
        } else if (mode === "dual_gradient") {
          node.style.background = `linear-gradient(to bottom, ${alphaColor}, rgba(0,0,0,0) 48%, ${alphaColor})`;
        } else if (mode === "full") {

      function formatCoverHeadline(value, lineCount = 4) {
        const raw = String(value || "").replace(/\s*展开\s*$/u, "").trim();
        if (!raw) return "";
        const existingLines = raw.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        if (existingLines.length >= lineCount) {
          return existingLines.slice(0, lineCount).join("\n");
        }
        const normalized = existingLines.join(" ").replace(/\s+/g, " ").trim();
        const words = normalized.split(/\s+/).filter(Boolean);
        if (words.length >= lineCount) {
          const lines = Array.from({ length: lineCount }, () => []);
          words.forEach((word, index) => {
            const targetLine = Math.min(lineCount - 1, Math.floor(index * lineCount / words.length));
            lines[targetLine].push(word);
          });
          return lines.map((line) => line.join(" ")).join("\n");
        }
        const chars = Array.from(normalized.replace(/\s+/g, ""));
        if (chars.length >= lineCount) {
          const chunkSize = Math.ceil(chars.length / lineCount);
          return Array.from({ length: lineCount }, (_, index) => chars.slice(index * chunkSize, (index + 1) * chunkSize).join(""))
            .filter(Boolean)
            .join("\n");
        }
        return existingLines.concat(Array(lineCount - existingLines.length).fill("")).join("\n");

        const backgroundTarget = backgroundTargetForControl(activeTarget || "title");
        selectTarget(backgroundTarget);
        postTemplateUpdates({ [backgroundTargetColorKey(backgroundTarget)]: value || "#0E1A10" });
      }

      function setHudRadius(value) {
        const backgroundTarget = backgroundTargetForControl(activeTarget || "title");
        selectTarget(backgroundTarget);
        postTemplateUpdates({ [backgroundTargetRadiusKey(backgroundTarget)]: clamp(Number(value), 0, 100) });
      }

      function hudScreenAlignX(value) {
        if (value === "right") return 1080;
        if (value === "center") return 540;
        return 0;
      }

      function hudBarScreenAlignX(value, width) {
        const safeWidth = clamp(Number(width || 1080), 120, 1080);
        if (value === "right") return 1080 - safeWidth;
        if (value === "center") return Math.round((1080 - safeWidth) / 2);
        return 0;
      }

      function postTemplateUpdates(updates) {
        currentPayload = { ...(currentPayload || {}), template: { ...((currentPayload || {}).template || {}), ...updates } };
        applyTemplatePayload(currentPayload);
        window.parent.postMessage({ type: "gasgx-video-template-update", updates }, window.location.origin);
      }

      function postTextUpdate(target, value) {
        const key = target === "title" ? "title" : target === "slogan" ? "slogan" : "hud_text";
        currentPayload = { ...(currentPayload || {}), [key]: value };
        window.parent.postMessage({ type: "gasgx-video-template-text-update", text: { [key]: value } }, window.location.origin);
      }

      function enterTextEdit() {
        const node = activeTextNode();
        if (!node) return;
        editingTextNode = node;
        node.contentEditable = "true";
        node.classList.add("is-editing");
        node.focus();
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(node);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function exitTextEdit() {
        if (!editingTextNode) return;
        editingTextNode.contentEditable = "false";
        postTextUpdate(editingTextNode.dataset.templateTarget, editablePlainText(editingTextNode));
        editingTextNode.classList.remove("is-editing");
        editingTextNode.blur();
        editingTextNode = null;
      }

      function editablePlainText(node) {
        return node.innerText.replace(/\u00a0/g, " ").replace(/\n$/, "");
      }

      function activeTextNode() {
        if (!activeTarget || isBackgroundTarget(activeTarget)) return null;
        return document.querySelector(`[data-template-target="${activeTarget}"].vm-template-text`);
      }

      function snapToCenter(x, y, node) {
        if (!node) return { x, y };
        const width = node.offsetWidth || 0;
        const height = node.offsetHeight || 0;
        const centerX = 196.5 - width / 2;
        const centerY = 426 - height / 2;
        return {
          x: Math.abs(x - centerX) < 8 ? centerX : x,
          y: Math.abs(y - centerY) < 8 ? centerY : y,
        };
      }

      function handleKeyboardMove(event) {
        if (editingTextNode || !activeTarget || !["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(event.key)) return;
        event.preventDefault();
        const step = event.shiftKey ? 10 : 1;
        const template = currentPayload?.template || {};
        const deltaX = event.key === "ArrowLeft" ? -step : event.key === "ArrowRight" ? step : 0;
        const deltaY = event.key === "ArrowUp" ? -step : event.key === "ArrowDown" ? step : 0;
        if (isBackgroundTarget(activeTarget)) {
          const prefix = activeTarget === "hudBar" ? "hud_bar" : activeTarget === "sloganBar" ? "slogan_bg" : "title_bg";
          postTemplateUpdates({
            [`${prefix}_x`]: clamp(Number(template[`${prefix}_x`] || 0) + deltaX, 0, 1080),
            [`${prefix}_y`]: clamp(Number(template[`${prefix}_y`] || 0) + deltaY, 0, 1920),
          });
          return;
        }
        const prefix = activeTarget === "title" ? "title" : activeTarget === "slogan" ? "slogan" : "hud";
        postTemplateUpdates({
          [`${prefix}_x`]: clamp(Number(template[`${prefix}_x`] || 0) + deltaX, 0, 1080),
          [`${prefix}_y`]: clamp(Number(template[`${prefix}_y`] || 0) + deltaY, 0, 1920),
        });
      }

      function selectCoverTarget(target) {
        activeCoverTarget = target;
        document.querySelectorAll(".cover-profile-editable").forEach((node) => node.classList.toggle("active", node.dataset.coverTarget === target));
      }

      function beginCoverDrag(event) {
        if (editingCoverNode) return;
        if (event.target.closest("button") && event.currentTarget.id !== "coverProfileCta") return;
        const target = event.currentTarget.dataset.coverTarget;
        selectCoverTarget(target);
        const template = currentPayload?.template || {};
        coverDragging = { target, startY: event.clientY, startOffset: Number(template[coverTargetOffsetKey(target)] || 0) };
        event.currentTarget.setPointerCapture(event.pointerId);
        event.currentTarget.addEventListener("pointermove", coverDragMove);
        event.currentTarget.addEventListener("pointerup", endCoverDrag, { once: true });
      }

      function coverDragMove(event) {
        if (!coverDragging) return;
        const nextOffset = clamp(coverDragging.startOffset + event.clientY - coverDragging.startY, -180, 420);
        postCoverTemplateUpdates({ [coverTargetOffsetKey(coverDragging.target)]: Math.round(nextOffset) });
      }

      function endCoverDrag(event) {
        event.currentTarget.removeEventListener("pointermove", coverDragMove);
        coverDragging = null;
      }

      function coverTargetYKey(target) {
        if (target === "brand" || target === "eyebrow") return "brand_y";
        if (target === "subhead") return "subhead_y";
        if (target === "cta") return "cta_y";
        return "headline_y";
      }

      function coverTargetSizeKey(target) {
        if (target === "singleLogo") return "single_cover_logo_font_size";
        if (target === "singleSlogan") return "single_cover_slogan_font_size";
        if (target === "singleTitle") return "single_cover_title_font_size";
        if (target === "brand") return "brand_font_size";
        if (target === "eyebrow") return "eyebrow_font_size";
        if (target === "subhead") return "subhead_font_size";
        if (target === "cta") return "cta_font_size";
        return "headline_font_size";
      }

      function adjustCoverSize(delta) {
        if (!activeCoverTarget) return;
        const template = currentPayload?.template || {};
        const key = coverTargetSizeKey(activeCoverTarget);
        postCoverTemplateUpdates({ [key]: Math.max(8, Number(template[key] || 32) + delta) });
      }

      function setCoverColor(value) {
        if (!activeCoverTarget) return;
        if (activeCoverTarget === "singleLogo" || activeCoverTarget === "singleSlogan" || activeCoverTarget === "singleTitle") {
          postCoverTemplateUpdates({ [`${activeCoverTarget}_color`]: value });
          return;
        }
        const key = activeCoverTarget === "subhead" || activeCoverTarget === "eyebrow" ? "secondary_color" : "primary_color";
        postCoverTemplateUpdates({ [key]: value });
      }

      function setCoverFontFamily(value) {
        if (!activeCoverTarget) return;
        postCoverTemplateUpdates({ [`${activeCoverTarget}_font_family`]: value });
      }

      function setCoverTextAlign(value) {
        if (!activeCoverTarget) return;
        const align = value || "left";
        postCoverTemplateUpdates({ [`${activeCoverTarget}_text_align`]: align });
      }

      function postCoverTemplateUpdates(updates) {
        currentPayload = { ...(currentPayload || {}), template: { ...((currentPayload || {}).template || {}), ...updates } };
        applyCoverProfilePayload(currentPayload);
        window.parent.postMessage({ type: "gasgx-cover-template-update", updates }, window.location.origin);
      }

      function postCoverTextUpdate(target, value) {
        currentPayload = { ...(currentPayload || {}), [target]: value };
        if (target === "singleLogo" || target === "singleSlogan" || target === "singleTitle") {
          const templateKey = {
            singleLogo: "single_cover_logo_text",
            singleSlogan: "single_cover_slogan_text",
            singleTitle: "single_cover_title_text",
          }[target];
          currentPayload = {
            ...(currentPayload || {}),
            template: { ...((currentPayload || {}).template || {}), [templateKey]: value },
          };
        }
        window.parent.postMessage({ type: "gasgx-cover-template-text-update", text: { [target]: value } }, window.location.origin);
      }

      function enterCoverTextEdit() {
        const node = document.querySelector(`[data-cover-target="${activeCoverTarget}"].cover-profile-editable`);
        if (!node) return;
        editingCoverNode = node;
        node.contentEditable = "true";
        node.classList.add("is-editing");
        node.focus();
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(node);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function exitCoverTextEdit() {
        if (!editingCoverNode) return;
        editingCoverNode.contentEditable = "false";
        postCoverTextUpdate(editingCoverNode.dataset.coverTarget, editablePlainText(editingCoverNode));
        editingCoverNode.classList.remove("is-editing");
        editingCoverNode.blur();
        editingCoverNode = null;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }
    </script>
</body>
</html>
