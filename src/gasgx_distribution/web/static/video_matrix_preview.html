<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

        html,
        body {
            width: 393px;
            height: 852px;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 852px;
            margin: 0;
            user-select: none;
        }

        .phone-mockup {
            width: 393px;
            height: 852px;
            border-radius: 55px;
            border: 14px solid #1a1a1a;
            box-shadow: 0 0 0 2px #333, 0 20px 40px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            background-color: #2c2c2c;
        }

        #previewVideo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            background: #000;
        }

        #templateBackgroundImage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            background: #000;
        }

        .vm-template-mask-bg {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: .72;
            background:
                linear-gradient(to bottom, rgba(5, 18, 14, .12), rgba(8, 52, 28, .38)),
                repeating-linear-gradient(105deg, rgba(93, 214, 44, .1) 0 2px, transparent 2px 28px);
        }

        .vm-template-mask-bg::before {
            content: "";
            position: absolute;
            inset: 34% 0 0;
            background: rgba(93, 214, 44, .34);
            clip-path: polygon(0 100%, 16% 38%, 28% 100%, 44% 34%, 56% 100%, 72% 32%, 84% 100%, 100% 36%, 100% 100%);
        }

        .vm-template-mask-bg.is-simple-mask::before {
            display: none;
        }

        .bg-overlay {
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.4) 0%,
                rgba(0,0,0,0.0) 25%,
                rgba(0,0,0,0.0) 60%,
                rgba(0,0,0,0.85) 100%
            );
            z-index: 3;
        }

        .text-stroke-yellow {
            color: #FEE74B;
            font-weight: 900;
            text-shadow:
                -2px -2px 0 #000,
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                -3px  0   0 #000,
                 3px  0   0 #000,
                 0   -3px 0 #000,
                 0    3px 0 #000,
                 0    6px 10px rgba(0,0,0,0.6);
            letter-spacing: 1px;
            line-height: 1.25;
        }

        .dynamic-island {
            width: 90px;
            height: 26px;
            background-color: #000;
            border-radius: 15px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        .sound-toggle {
            position: absolute;
            z-index: 60;
            right: 16px;
            top: 108px;
            min-width: 44px;
            min-height: 24px;
            padding: 0 8px;
            border: 1px solid rgba(255,255,255,.22);
            border-radius: 999px;
            color: #fff;
            background: rgba(0,0,0,.42);
            font: 800 11px/1 'Noto Sans SC', sans-serif;
            text-shadow: 0 2px 10px rgba(0,0,0,.8);
            cursor: pointer;
        }

        .status-scale {
            transform: scale(0.75);
            transform-origin: top center;
            width: 133.333333%;
            margin-left: -16.666667%;
        }

        .bottom-action-scale {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%) scale(0.75);
            transform-origin: bottom center;
            width: 500px;
            justify-content: space-between;
            margin-left: 0;
        }

        .bottom-meta {
            position: absolute;
            left: 21px;
            bottom: 64px;
            width: 330px;
            margin-bottom: 0;
        }

        .creator-group {
            transform: translateX(-52px);
        }

        .back-control {
            transform: translateY(-24px);
        }

        .vm-template-layer {
            position: absolute;
            inset: 0;
            z-index: 18;
            overflow: hidden;
        }

        .vm-template-hud-bar {
            position: absolute;
            left: 0;
            width: 100%;
            border-radius: 10px;
            background: rgba(5, 17, 24, .68);
            cursor: move;
            user-select: text;
        }

        .vm-template-text-bar {
            position: absolute;
            left: 0;
            width: 100%;
            border-radius: 10px;
            background: rgba(5, 17, 24, .68);
            cursor: move;
            user-select: none;
        }

        .vm-template-editable.is-editing {
            cursor: text;
        }

        .vm-template-text:focus {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
            background: rgba(0,0,0,.24);
        }

        .vm-template-text {
            position: absolute;
            max-width: 340px;
            color: #fff;
            font-weight: 900;
            line-height: 1.1;
            text-shadow: 0 2px 10px rgba(0,0,0,.76);
            white-space: pre-wrap;
            overflow-wrap: break-word;
            cursor: move;
            user-select: text;
        }

        .vm-template-editable.active {
            outline: 2px solid #5dd62c;
            outline-offset: 4px;
        }

        .vm-visual-toolbar {
            position: absolute;
            left: 50%;
            bottom: 86px;
            transform: translateX(-50%);
            z-index: 70;
            display: none;
            align-items: center;
            flex-wrap: nowrap;
            gap: 4px;
            max-width: calc(100% - 22px);
            padding: 5px;
            border: 1px solid rgba(93, 214, 44, .5);
            border-radius: 10px;
            background: rgba(0, 0, 0, .72);
            box-shadow: 0 12px 28px rgba(0,0,0,.42);
        }

        .vm-visual-toolbar.active {
            display: none;
        }

        .vm-visual-toolbar button,
        .vm-visual-toolbar select,
        .vm-visual-toolbar input {
            height: 24px;
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 6px;
            color: #fff;
            background: rgba(18,18,18,.92);
            font: 800 10px/1 'Noto Sans SC', sans-serif;
        }

        .vm-visual-toolbar button {
            min-width: 24px;
            padding: 0 6px;
        }

        .vm-visual-toolbar select {
            width: 82px;
        }

        .vm-visual-toolbar input[type="color"] {
            width: 28px;
            padding: 2px;
        }

        .vm-align-btn {
            font-size: 11px;
        }

        .vm-align-btn.active {
            border-color: #5dd62c;
            color: #5dd62c;
            background: rgba(93, 214, 44, .14);
        }

        .vm-center-guides {
            position: absolute;
            inset: 0;
            z-index: 69;
            pointer-events: none;
            display: none;
        }

        .vm-center-guides.active {
            display: block;
        }

        .vm-center-guides::before,
        .vm-center-guides::after {
            content: "";
            position: absolute;
            background: rgba(93, 214, 44, .74);
            box-shadow: 0 0 10px rgba(93,214,44,.45);
        }

        .vm-center-guides::before {
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
        }

        .vm-center-guides::after {
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
        }

        .vm-template-slogan {
            font-weight: 700;
        }

        .vm-template-hud {
            font-weight: 600;
            line-height: 1.25;
        }

        body.cover-profile-mode #previewVideo,
        body.cover-profile-mode .vm-template-mask-bg,
        body.cover-profile-mode .bg-overlay,
        body.cover-profile-mode .vm-template-layer,
        body.cover-profile-mode .status-scale,
        body.cover-profile-mode .back-control,
        body.cover-profile-mode .sound-toggle,
        body.cover-profile-mode .phone-mockup > .relative.z-10 {
            display: none !important;
        }

        .cover-profile-shell {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            background: #101010;
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
        }

        .cover-status-bar {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
        }

        .cover-status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: .92;
        }

        .cover-status-icons svg {
            display: block;
            color: #fff;
        }

        .cover-island {
            position: absolute;
            left: 50%;
            top: 8px;
            width: 110px;
            height: 30px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: #000;

        .cover-profile-scroll {
            flex: 1;
            overflow: hidden;
            background: #101010;
        }

        .cover-profile-head {
            display: grid;
            grid-template-columns: 76px minmax(0, 1fr);
            gap: 16px;
            padding: 8px 20px 0;

        .cover-avatar {

            height: 76px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 50%;
            background: #1c1c1e;
            box-shadow: inset 0 0 18px rgba(0,0,0,.45);
            color: #5dd62c;
            font-size: 20px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 0 0 10px rgba(93, 214, 44, .45);
        }

        .cover-profile-copy {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .cover-profile-editable {
            cursor: move;
            user-select: text;
        }

        .cover-profile-editable.active {
            outline: 2px solid #5dd62c;
            outline-offset: 4px;
            border-radius: 6px;
        }

        .cover-profile-editable.is-editing {
            cursor: text;
        }

        .cover-brand-name {
            color: #fff;
            font-size: 19px;
            font-weight: 500;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .cover-location {
            margin-top: 8px;
            color: #888;
            font-size: 13px;
        }

        .cover-bio {
            position: relative;
            padding: 18px 20px 0;
            color: #ccc;
            font-size: 14px;
            line-height: 1.7;
        }

        #coverProfileHeadline {
            display: block;
            min-height: 4.8em;
            white-space: pre-line;
            line-height: 1.2;
        }

        .cover-expand {
            color: #888;
        }

        .cover-count {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
        }

        .cover-action-row {
            display: flex;
            gap: 12px;
            padding: 18px 20px 18px;
        }

        .cover-action-row button {
            flex: 1;
            display: grid;
            place-items: center;
            min-height: 40px;
            border: 0;
            border-radius: 8px;
            box-shadow: none;
            font-size: 15px;
            font-weight: 700;
        }

        .cover-follow-button {
            color: #000;
            background: #5dd62c;
            text-align: center;
        }

        .cover-message-button {
            color: #fff;
            background: #262628;
        }

        .cover-profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #000;
        }

        .cover-profile-tile {
            position: relative;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            background: #222;
        }

        .cover-profile-tile img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-tile-shade {
            position: absolute;
            inset: 0 0 auto;
            height: 84px;
            background: linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.32), transparent);
        }

        .cover-tile-copy {
            position: absolute;
            inset: 8px 8px auto;
            z-index: 2;
        }

        .cover-tile-copy strong {
            display: block;
            color: #5dd62c;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
        }

        .cover-tile-copy span {
            display: block;
            margin-top: 4px;
            color: #5dd62c;
            font-size: 8px;
            line-height: 1.1;
            white-space: nowrap;
            transform: scale(.94);
            transform-origin: left top;
        }

        .cover-tile-title {
            margin-top: 8px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.15;
        }

        .cover-tile-like {
            position: absolute;
            right: 9px;
            bottom: 10px;
            z-index: 3;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            color: rgba(255,255,255,.9);
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,.75);
        }

        .cover-tile-like svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>

                                <span class="text-[12px] text-white/70 drop-shadow-md whitespace-nowrap">10个朋友关注</span>

                        <div class="flex items-center gap-4 shrink-0">
                            <div class="flex flex-col items-center gap-1">
                                <svg class="w-7 h-7 drop-shadow-md" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.514"></path></svg>
                                <span class="text-[12px] font-medium drop-shadow-md">3</span>
                            </div>
                            <div class="flex flex-col items-center gap-1">
                                <svg class="w-7 h-7 drop-shadow-md" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"></path></svg>
                                <span class="text-[12px] font-medium drop-shadow-md">1</span>
                            </div>
                            <div class="flex flex-col items-center gap-1">
                                <svg class="w-7 h-7 drop-shadow-md" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                <span class="text-[12px] font-medium drop-shadow-md">3</span>
                            </div>
                            <div class="flex flex-col items-center gap-1">
                                <svg class="w-7 h-7 drop-shadow-md" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                <span class="text-[12px] font-medium drop-shadow-md">评论</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const videoPath = params.get("path") || "";
      const templatePayload = decodeTemplatePayload(params.get("template"));
      const video = document.getElementById("previewVideo");
      const soundToggle = document.getElementById("soundToggle");
      const phone = document.querySelector(".phone-mockup");
      const backgroundImage = document.getElementById("templateBackgroundImage");
      const templateMask = document.getElementById("templateMaskBg");
      let currentPayload = templatePayload;
      let activeTarget = "";
      let activeCoverTarget = "";
      let dragging = null;
      let coverDragging = null;
      let editingTextNode = null;
      let editingCoverNode = null;
      if (videoPath) {
        video.src = `/api/video-matrix/preview-file?path=${encodeURIComponent(videoPath)}`;
      } else {
        video.hidden = true;
      }
      video.muted = false;
      video.volume = 1;
      video.play().catch(() => {
        soundToggle.textContent = "Tap for sound";
      });
      soundToggle.addEventListener("click", async () => {
        video.muted = false;
        video.volume = 1;
        await video.play();
        soundToggle.textContent = "Sound on";
      });
      function toggleVideoPlayback() {
        if (video.paused) video.play();
        else video.pause();
      }
      video.addEventListener("click", toggleVideoPlayback);
      phone.addEventListener("click", (event) => {
        if (event.target.closest(".vm-template-layer")) return;
        if (event.target.closest("button")) return;
        toggleVideoPlayback();
      });
      document.addEventListener("click", (event) => {
        if (event.target.closest(".vm-template-layer")) return;
        exitTextEdit();
      });
      applyTemplatePayload(templatePayload);
      initVisualEditor();
      initCoverVisualEditor();

      function decodeTemplatePayload(value) {
        if (!value) return null;
        try {
          return JSON.parse(decodeURIComponent(escape(atob(value))));
        } catch {
          return null;
        }
      }

      function designX(value) {
        return `${Number(value || 0) * 393 / 1080}px`;
      }

      function designY(value) {
        return `${Number(value || 0) * 852 / 1920}px`;
      }

      function designSize(value) {
        return `${Math.max(8, Number(value || 24) * 393 / 1080)}px`;
      }

      function toDesignX(value) {
        return Math.round(Number(value || 0) * 1080 / 393);
      }

      function toDesignY(value) {
        return Math.round(Number(value || 0) * 1920 / 852);
      }

      function setLayerText(id, visible, value, x, y, size, color) {
        const node = document.getElementById(id);
        node.hidden = !visible;
        if (!visible) return;
        node.textContent = value || "";
        node.style.left = designX(x);
        node.style.top = designY(y);
        node.style.fontSize = designSize(size);
        node.style.color = color || "#ffffff";
        node.style.fontFamily = (currentPayload?.template || {})[`${id === "templateTitle" ? "title" : id === "templateSlogan" ? "slogan" : "hud"}_font_family`] || "'Noto Sans SC', sans-serif";
        const alignKey = `${id === "templateTitle" ? "title" : id === "templateSlogan" ? "slogan" : "hud"}_text_align`;
        node.style.textAlign = (currentPayload?.template || {})[alignKey] || "left";
      }

      function applyTemplatePayload(payload) {
        if (!payload) return;
        if (payload.cover_mode) {
          document.body.classList.add("cover-profile-mode");
          applyCoverProfilePayload(payload);
          return;
        }
        document.body.classList.remove("cover-profile-mode");
        const template = payload.template || {};
        backgroundImage.hidden = !payload.background_image_url;
        if (payload.background_image_url) backgroundImage.src = payload.background_image_url;
        applyTemplateMask(templateMask, template, payload.show_template_mask !== false);
        const hudBar = document.getElementById("templateHudBar");
        hudBar.hidden = !template.show_hud;
        if (template.show_hud) {
          hudBar.style.top = designY(template.hud_bar_y);
          hudBar.style.height = designY(template.hud_bar_height || 120);
          hudBar.style.background = template.hud_bar_color || "rgba(5, 17, 24, .68)";
          hudBar.style.opacity = template.hud_bar_opacity ?? 0.68;
        }
        setTextBar("templateSloganBar", template.show_slogan, template.slogan_y, template.slogan_bg_height || 80, template.slogan_bg_color || template.hud_bar_color, template.slogan_bg_opacity ?? 0.62);
        setTextBar("templateTitleBar", template.show_title, template.title_y, template.title_bg_height || template.slogan_bg_height || 92, template.title_bg_color || template.hud_bar_color, template.title_bg_opacity ?? template.slogan_bg_opacity ?? 0.62);
        setLayerText("templateSlogan", template.show_slogan, payload.slogan, template.slogan_x, template.slogan_y, template.slogan_font_size, template.secondary_color);
        setLayerText("templateTitle", template.show_title, payload.title, template.title_x, template.title_y, template.title_font_size, template.primary_color);
        setLayerText("templateHudText", template.show_hud, payload.hud_text, template.hud_x, template.hud_y, template.hud_font_size, template.secondary_color);
      }

      function applyCoverProfilePayload(payload) {
        currentPayload = payload;
        const template = payload.template || {};
        const shell = document.getElementById("coverProfileShell");
        shell.hidden = false;
        setCoverText("coverProfileBrand", payload.brand || template.profile_brand_text || "GasGx | 燃气发电解决方案", template.brand_font_size || 52, template.primary_color, "brand");
        setCoverText("coverProfileLocation", payload.eyebrow || template.profile_eyebrow_text || "山西 大同", template.eyebrow_font_size || 30, template.secondary_color || "#888888", "eyebrow");
        setCoverText("coverProfileHeadline", formatCoverHeadline(payload.headline || payload.slogan || "全球领先的搁浅天然气算力变现引擎，解锁搁浅燃气能源驱动能源就地变现..."), template.headline_font_size || 38, template.primary_color, "headline");
        setCoverText("coverProfileSubhead", template.profile_subhead_text || "162 条原创内容", template.subhead_font_size || 28, template.secondary_color || "#666666", "subhead");
        setCoverText("coverProfileCta", template.profile_cta_text || "关注", template.cta_font_size || 42, "#000000", "cta");
        renderCoverProfileGrid(payload.background_image_url);
      }

      function applyTemplateMask(node, template, visible) {
        const mode = template.mask_mode || "bottom_gradient";
        node.hidden = !visible || mode === "none";
        if (node.hidden) return;
        const color = normalizeColor(template.mask_color || template.gradient_color || template.tint_color || "#071015");
        const opacity = Math.max(0, Math.min(1, Number(template.mask_opacity ?? template.gradient_opacity ?? template.tint_opacity ?? 0.35)));
        const alphaColor = hexToRgba(color, opacity);
        node.classList.add("is-simple-mask");
        node.style.opacity = "1";
        if (mode === "top_gradient") {
          node.style.background = `linear-gradient(to bottom, ${alphaColor}, rgba(0,0,0,0))`;
        } else if (mode === "full") {
          node.style.background = alphaColor;
        } else {
          node.style.background = `linear-gradient(to top, ${alphaColor}, rgba(0,0,0,0))`;
        }
      }

      function setCoverText(id, text, size, color, target, withExpand = false) {
        const node = document.getElementById(id);
        node.innerHTML = `${escapeHtmlText(text || "")}${withExpand ? '<span class="cover-expand">展开</span>' : ""}`;
        node.style.transform = `translateY(${Number((currentPayload?.template || {})[coverTargetOffsetKey(target)] || 0)}px)`;
        node.style.fontSize = designSize(size || 32);
        node.style.color = color || "#ffffff";
        node.style.fontFamily = (currentPayload?.template || {})[`${target}_font_family`] || "'Noto Sans SC', sans-serif";
        node.style.textAlign = (currentPayload?.template || {})[`${target}_text_align`] || "left";
      }

      function formatCoverHeadline(value, lineCount = 4) {
        const raw = String(value || "").replace(/\s*展开\s*$/u, "").trim();
        if (!raw) return "";
        const existingLines = raw.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        if (existingLines.length >= lineCount) {
          return existingLines.slice(0, lineCount).join("\n");
        }
        const normalized = existingLines.join(" ").replace(/\s+/g, " ").trim();
        const words = normalized.split(/\s+/).filter(Boolean);
        if (words.length >= lineCount) {
          const lines = Array.from({ length: lineCount }, () => []);
          words.forEach((word, index) => {
            const targetLine = Math.min(lineCount - 1, Math.floor(index * lineCount / words.length));
            lines[targetLine].push(word);
          });
          return lines.map((line) => line.join(" ")).join("\n");
        }
        const chars = Array.from(normalized.replace(/\s+/g, ""));
        if (chars.length >= lineCount) {
          const chunkSize = Math.ceil(chars.length / lineCount);
          return Array.from({ length: lineCount }, (_, index) => chars.slice(index * chunkSize, (index + 1) * chunkSize).join(""))
            .filter(Boolean)
            .join("\n");
        }
        return existingLines.concat(Array(lineCount - existingLines.length).fill("")).join("\n");
      }

      function escapeHtmlText(value) {
        return String(value).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
      }

      function coverTargetOffsetKey(target) {
        return `profile_${target}_offset_y`;
      }

      function renderCoverProfileGrid(primaryImageUrl) {
        const grid = document.getElementById("coverProfileGrid");
        const template = currentPayload?.template || {};
        const payloadImages = Array.isArray(currentPayload?.background_image_urls) ? currentPayload.background_image_urls.filter(Boolean) : [];
        const images = [
          ...payloadImages,
          primaryImageUrl,
          "https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?w=500&q=80",
          "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500&q=80",
          "https://images.unsplash.com/photo-1621905251189-08b45d6a269e?w=500&q=80",
          "https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?w=500&q=80",
          "https://images.unsplash.com/photo-1534398079543-7ae6d016b86a?w=500&q=80",
          "https://images.unsplash.com/photo-1563986768494-4dee2763ff0f?w=500&q=80",
          "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500&q=80",
          "https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=500&q=80",
        ].filter(Boolean).filter((src, index, list) => list.indexOf(src) === index);
        const tileBrand = template.tile_brand_text || "GasGx";
        const tileTagline = template.tile_tagline_text || "终结废气 | 重塑能源 | 就地变现";
        const titles = coverTileTitles(template.tile_titles_text);
        const likes = [128, 1097, 45, 888, 260, 410, 188, 332, 76];
        grid.innerHTML = images.slice(0, 9).map((src, index) => `
          <div class="cover-profile-tile">
            <img src="${src}" alt="">
            <div class="cover-tile-shade"></div>
            <div class="cover-tile-copy">
              <strong>${escapeHtmlText(tileBrand)}</strong>
              <span>${escapeHtmlText(tileTagline)}</span>
              <div class="cover-tile-title">${escapeHtmlText(titles[index] || titles[0])}</div>
            </div>
            <div class="cover-tile-like">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>
              <span>${likes[index] || 0}</span>
            </div>
          </div>
        `).join("");
      }

      function coverTileTitles(value) {
        const fallback = ["燃气发电机组并网测试", "油田伴生气资源再利用", "移动式算力中心部署", "野外发电设备日常维护", "零燃除：变废为宝", "集装箱数据中心内景", "高效燃气轮机运行状态", "夜间井场持续发电作业", "极寒环境设备启动测试"];
        const lines = String(value || "").split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        return lines.length ? lines : fallback;
      }

      function setTextBar(id, visible, y, height, color, opacity) {
        const node = document.getElementById(id);
        node.hidden = !visible;
        if (!visible) return;
        node.style.top = designY(y);
        node.style.height = designY(height);
        node.style.background = color || "rgba(5, 17, 24, .68)";
        node.style.opacity = opacity;
      }

      function initVisualEditor() {
        document.querySelectorAll(".vm-template-editable").forEach((node) => {
          node.addEventListener("pointerdown", beginDrag);
          node.addEventListener("click", (event) => {
            event.stopPropagation();
            selectTarget(node.dataset.templateTarget);
          });
        });
        document.querySelectorAll(".vm-template-text").forEach((node) => {
          node.contentEditable = "false";
          node.spellcheck = false;
          node.addEventListener("pointerdown", (event) => {
            if (event.detail > 1) event.stopPropagation();
          });
          node.addEventListener("input", () => postTextUpdate(node.dataset.templateTarget, editablePlainText(node)));
          node.addEventListener("blur", exitTextEdit);
          node.addEventListener("keydown", (event) => {
            if (event.key === "Escape") exitTextEdit();
            if ((event.ctrlKey || event.metaKey) && event.key === "Enter") exitTextEdit();
          });
        });
        document.getElementById("editText").addEventListener("click", (event) => {
          event.stopPropagation();
          enterTextEdit();
        });
        document.getElementById("sizeDown").addEventListener("click", () => adjustSize(-2));
        document.getElementById("sizeUp").addEventListener("click", () => adjustSize(2));
        document.getElementById("visualColor").addEventListener("input", (event) => setColor(event.target.value));
        document.getElementById("fontFamily").addEventListener("change", (event) => setFontFamily(event.target.value));
        document.querySelectorAll(".vm-align-btn").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            setTextAlign(button.dataset.align);
          });
        });
        document.addEventListener("keydown", handleKeyboardMove);
      }

      function initCoverVisualEditor() {
        document.querySelectorAll(".cover-profile-editable").forEach((node) => {
          node.addEventListener("pointerdown", beginCoverDrag);
          node.addEventListener("click", (event) => {
            event.stopPropagation();
            selectCoverTarget(node.dataset.coverTarget);
          });
          node.contentEditable = "false";
          node.spellcheck = false;
          node.addEventListener("input", () => postCoverTextUpdate(node.dataset.coverTarget, editablePlainText(node)));
          node.addEventListener("blur", exitCoverTextEdit);
          node.addEventListener("keydown", (event) => {
            if (event.key === "Escape") exitCoverTextEdit();
            if ((event.ctrlKey || event.metaKey) && event.key === "Enter") exitCoverTextEdit();
          });
        });
      }

      window.addEventListener("message", (event) => {
        if (event.origin !== window.location.origin || event.data?.type !== "gasgx-video-template-command") return;
        const { command, value } = event.data;
        if (!activeTarget && command !== "edit") selectTarget("title");
        if (command === "size-down") adjustSize(-2);
        if (command === "size-up") adjustSize(2);
        if (command === "edit") enterTextEdit();
        if (command === "align") setTextAlign(value || "left");
        if (command === "font-family") setFontFamily(value);
        if (command === "color") setColor(value);
      });

      window.addEventListener("message", (event) => {
        if (event.origin !== window.location.origin || event.data?.type !== "gasgx-cover-template-command") return;
        const { command, value } = event.data;
        if (!activeCoverTarget && command !== "edit") selectCoverTarget("headline");
        if (command === "size-down") adjustCoverSize(-2);
        if (command === "size-up") adjustCoverSize(2);
        if (command === "edit") enterCoverTextEdit();
        if (command === "align") setCoverTextAlign(value || "left");
        if (command === "font-family") setCoverFontFamily(value);
        if (command === "color") setCoverColor(value);
      });

      function selectTarget(target) {
        activeTarget = target;
        document.querySelectorAll(".vm-template-editable").forEach((node) => node.classList.toggle("active", node.dataset.templateTarget === target));
        document.getElementById("visualToolbar").classList.add("active");
        const template = currentPayload?.template || {};
        document.getElementById("fontFamily").disabled = isBackgroundTarget(target);
        document.getElementById("visualColor").value = normalizeColor(backgroundColorValue(target, template) || (target === "title" ? template.primary_color : template.secondary_color));
        document.getElementById("fontFamily").value = template[`${target}_font_family`] || "'Noto Sans SC', sans-serif";
        document.getElementById("editText").disabled = isBackgroundTarget(target);
        updateAlignButtons(template[`${target}_text_align`] || "left");
      }

      function isBackgroundTarget(target) {
        return target === "hudBar" || target === "sloganBar" || target === "titleBar";
      }

      function backgroundColorValue(target, template) {
        if (target === "hudBar") return template.hud_bar_color;
        if (target === "sloganBar") return template.slogan_bg_color || template.hud_bar_color;
        if (target === "titleBar") return template.title_bg_color || template.hud_bar_color;
        return "";
      }

      function normalizeColor(value) {
        if (!value || !String(value).startsWith("#")) return "#ffffff";
        return String(value).slice(0, 7);
      }

      function hexToRgba(value, opacity) {
        const clean = normalizeColor(value).replace("#", "");
        const red = parseInt(clean.slice(0, 2), 16);
        const green = parseInt(clean.slice(2, 4), 16);
        const blue = parseInt(clean.slice(4, 6), 16);
        return `rgba(${red}, ${green}, ${blue}, ${opacity})`;
      }

      function beginDrag(event) {
        if (editingTextNode) return;
        if (event.currentTarget.isContentEditable) return;
        if (event.target.closest("#visualToolbar")) return;
        const target = event.currentTarget.dataset.templateTarget;
        selectTarget(target);
        const rect = event.currentTarget.getBoundingClientRect();
        dragging = { target, dx: event.clientX - rect.left, dy: event.clientY - rect.top };
        event.currentTarget.setPointerCapture(event.pointerId);
        event.currentTarget.addEventListener("pointermove", dragMove);
        event.currentTarget.addEventListener("pointerup", endDrag, { once: true });
        document.getElementById("centerGuides").classList.add("active");
      }

      function dragMove(event) {
        if (!dragging) return;
        const phoneRect = phone.getBoundingClientRect();
        const rawX = Math.max(0, Math.min(393, event.clientX - phoneRect.left - dragging.dx));
        const rawY = Math.max(0, Math.min(852, event.clientY - phoneRect.top - dragging.dy));
        const snapped = snapToCenter(rawX, rawY, event.currentTarget);
        const updates = isBackgroundTarget(dragging.target)
          ? barPositionUpdates(dragging.target, snapped.y)
          : targetPositionUpdates(dragging.target, snapped.x, snapped.y);
        postTemplateUpdates(updates);
      }

      function endDrag(event) {
        event.currentTarget.removeEventListener("pointermove", dragMove);
        dragging = null;
        document.getElementById("centerGuides").classList.remove("active");
      }

      function targetPositionUpdates(target, x, y) {
        if (target === "title") return { title_x: toDesignX(x), title_y: toDesignY(y) };
        if (target === "slogan") return { slogan_x: toDesignX(x), slogan_y: toDesignY(y) };
        return { hud_x: toDesignX(x), hud_y: toDesignY(y) };
      }

      function barPositionUpdates(target, y) {
        if (target === "sloganBar") return { slogan_y: toDesignY(y) };
        if (target === "titleBar") return { title_y: toDesignY(y) };
        return { hud_bar_y: toDesignY(y) };
      }

      function adjustSize(delta) {
        if (!activeTarget) return;
        const template = currentPayload?.template || {};
        const key = activeTarget === "hudBar" ? "hud_bar_height" : activeTarget === "sloganBar" ? "slogan_bg_height" : activeTarget === "titleBar" ? "title_bg_height" : `${activeTarget}_font_size`;
        postTemplateUpdates({ [key]: Math.max(8, Number(template[key] || 24) + delta) });
      }

      function setColor(value) {
        if (!activeTarget) return;
        const key = activeTarget === "hudBar" ? "hud_bar_color" : activeTarget === "sloganBar" ? "slogan_bg_color" : activeTarget === "titleBar" ? "title_bg_color" : activeTarget === "title" ? "primary_color" : "secondary_color";
        postTemplateUpdates({ [key]: value });
      }

      function setFontFamily(value) {
        if (!activeTarget || isBackgroundTarget(activeTarget)) return;
        postTemplateUpdates({ [`${activeTarget}_font_family`]: value });
      }

      function setTextAlign(value) {
        if (!activeTarget || isBackgroundTarget(activeTarget)) return;
        postTemplateUpdates({ [`${activeTarget}_text_align`]: value || "left" });
        updateAlignButtons(value || "left");
      }

      function updateAlignButtons(value) {
        document.querySelectorAll(".vm-align-btn").forEach((button) => {
          button.disabled = isBackgroundTarget(activeTarget);
          button.classList.toggle("active", button.dataset.align === value && !isBackgroundTarget(activeTarget));
        });
      }

      function postTemplateUpdates(updates) {
        currentPayload = { ...(currentPayload || {}), template: { ...((currentPayload || {}).template || {}), ...updates } };
        applyTemplatePayload(currentPayload);
        window.parent.postMessage({ type: "gasgx-video-template-update", updates }, window.location.origin);
      }

      function postTextUpdate(target, value) {
        const key = target === "title" ? "title" : target === "slogan" ? "slogan" : "hud_text";
        currentPayload = { ...(currentPayload || {}), [key]: value };
        window.parent.postMessage({ type: "gasgx-video-template-text-update", text: { [key]: value } }, window.location.origin);
      }

      function enterTextEdit() {
        const node = activeTextNode();
        if (!node) return;
        editingTextNode = node;
        node.contentEditable = "true";
        node.classList.add("is-editing");
        node.focus();
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(node);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function exitTextEdit() {
        if (!editingTextNode) return;
        editingTextNode.contentEditable = "false";
        postTextUpdate(editingTextNode.dataset.templateTarget, editablePlainText(editingTextNode));
        editingTextNode.classList.remove("is-editing");
        editingTextNode.blur();
        editingTextNode = null;
      }

      function editablePlainText(node) {
        return node.innerText.replace(/\u00a0/g, " ").replace(/\n$/, "");
      }

      function activeTextNode() {
        if (!activeTarget || isBackgroundTarget(activeTarget)) return null;
        return document.querySelector(`[data-template-target="${activeTarget}"].vm-template-text`);
      }

      function snapToCenter(x, y, node) {
        if (!node) return { x, y };
        const width = node.offsetWidth || 0;
        const height = node.offsetHeight || 0;
        const centerX = 196.5 - width / 2;
        const centerY = 426 - height / 2;
        return {
          x: Math.abs(x - centerX) < 8 ? centerX : x,
          y: Math.abs(y - centerY) < 8 ? centerY : y,
        };
      }

      function handleKeyboardMove(event) {
        if (editingTextNode || !activeTarget || !["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(event.key)) return;
        event.preventDefault();
        const step = event.shiftKey ? 10 : 1;
        const template = currentPayload?.template || {};
        const deltaX = event.key === "ArrowLeft" ? -step : event.key === "ArrowRight" ? step : 0;
        const deltaY = event.key === "ArrowUp" ? -step : event.key === "ArrowDown" ? step : 0;
        if (isBackgroundTarget(activeTarget)) {
          const key = activeTarget === "hudBar" ? "hud_bar_y" : activeTarget === "sloganBar" ? "slogan_y" : "title_y";
          postTemplateUpdates({ [key]: clamp(Number(template[key] || 0) + deltaY, 0, 1920) });
          return;
        }
        const prefix = activeTarget === "title" ? "title" : activeTarget === "slogan" ? "slogan" : "hud";
        postTemplateUpdates({
          [`${prefix}_x`]: clamp(Number(template[`${prefix}_x`] || 0) + deltaX, 0, 1080),
          [`${prefix}_y`]: clamp(Number(template[`${prefix}_y`] || 0) + deltaY, 0, 1920),
        });
      }

      function selectCoverTarget(target) {
        activeCoverTarget = target;
        document.querySelectorAll(".cover-profile-editable").forEach((node) => node.classList.toggle("active", node.dataset.coverTarget === target));
      }

      function beginCoverDrag(event) {
        if (editingCoverNode) return;
        if (event.target.closest("button") && event.currentTarget.id !== "coverProfileCta") return;
        const target = event.currentTarget.dataset.coverTarget;
        selectCoverTarget(target);
        const template = currentPayload?.template || {};
        coverDragging = { target, startY: event.clientY, startOffset: Number(template[coverTargetOffsetKey(target)] || 0) };
        event.currentTarget.setPointerCapture(event.pointerId);
        event.currentTarget.addEventListener("pointermove", coverDragMove);
        event.currentTarget.addEventListener("pointerup", endCoverDrag, { once: true });
      }

      function coverDragMove(event) {
        if (!coverDragging) return;
        const nextOffset = clamp(coverDragging.startOffset + event.clientY - coverDragging.startY, -180, 420);
        postCoverTemplateUpdates({ [coverTargetOffsetKey(coverDragging.target)]: Math.round(nextOffset) });
      }

      function endCoverDrag(event) {
        event.currentTarget.removeEventListener("pointermove", coverDragMove);
        coverDragging = null;
      }

      function coverTargetYKey(target) {
        if (target === "brand" || target === "eyebrow") return "brand_y";
        if (target === "subhead") return "subhead_y";
        if (target === "cta") return "cta_y";
        return "headline_y";
      }

      function coverTargetSizeKey(target) {
        if (target === "brand") return "brand_font_size";
        if (target === "eyebrow") return "eyebrow_font_size";
        if (target === "subhead") return "subhead_font_size";
        if (target === "cta") return "cta_font_size";
        return "headline_font_size";
      }

      function adjustCoverSize(delta) {
        if (!activeCoverTarget) return;
        const template = currentPayload?.template || {};
        const key = coverTargetSizeKey(activeCoverTarget);
        postCoverTemplateUpdates({ [key]: Math.max(8, Number(template[key] || 32) + delta) });
      }

      function setCoverColor(value) {
        if (!activeCoverTarget) return;
        const key = activeCoverTarget === "subhead" || activeCoverTarget === "eyebrow" ? "secondary_color" : "primary_color";
        postCoverTemplateUpdates({ [key]: value });
      }

      function setCoverFontFamily(value) {
        if (!activeCoverTarget) return;
        postCoverTemplateUpdates({ [`${activeCoverTarget}_font_family`]: value });
      }

      function setCoverTextAlign(value) {
        if (!activeCoverTarget) return;
        postCoverTemplateUpdates({ [`${activeCoverTarget}_text_align`]: value || "left" });
      }

      function postCoverTemplateUpdates(updates) {
        currentPayload = { ...(currentPayload || {}), template: { ...((currentPayload || {}).template || {}), ...updates } };
        applyCoverProfilePayload(currentPayload);
        window.parent.postMessage({ type: "gasgx-cover-template-update", updates }, window.location.origin);
      }

      function postCoverTextUpdate(target, value) {
        currentPayload = { ...(currentPayload || {}), [target]: value };
        window.parent.postMessage({ type: "gasgx-cover-template-text-update", text: { [target]: value } }, window.location.origin);
      }

      function enterCoverTextEdit() {
        const node = document.querySelector(`[data-cover-target="${activeCoverTarget}"].cover-profile-editable`);
        if (!node) return;
        editingCoverNode = node;
        node.contentEditable = "true";
        node.classList.add("is-editing");
        node.focus();
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(node);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function exitCoverTextEdit() {
        if (!editingCoverNode) return;
        editingCoverNode.contentEditable = "false";
        postCoverTextUpdate(editingCoverNode.dataset.coverTarget, editablePlainText(editingCoverNode));
        editingCoverNode.classList.remove("is-editing");
        editingCoverNode.blur();
        editingCoverNode = null;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }
    </script>
</body>
</html>
