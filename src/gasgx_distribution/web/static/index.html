<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GasGx Video Distribution</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div>
        <strong>GasGx</strong>
        <small>Video Distribution</small>
      </div>
    </div>
    <nav>
      <button class="nav-btn active" data-view="overview">总览</button>
      <button class="nav-btn" data-view="accounts">账号矩阵</button>
      <button class="nav-btn" data-view="settings">公共设置</button>
      <button class="nav-btn" data-view="tasks">任务中心</button>
      <button class="nav-btn" data-view="stats">数据统计</button>
    </nav>
  </aside>
  <main class="workspace">
    <header class="topbar">
      <div>
        <h1>账号矩阵维护系统</h1>
        <p>独立账号、独立浏览器、发布/评论/私信/统计任务入口</p>
      </div>
      <button id="refresh" class="btn primary">刷新</button>
    </header>

    <section id="overview" class="view active">
      <div id="summary" class="metric-grid"></div>
      <div class="panel">
        <div class="panel-head">
          <h2>平台能力</h2>
        </div>
        <div id="platforms" class="platform-groups"></div>
      </div>
    </section>

    <section id="accounts" class="view">
      <div class="split">
        <form id="account-form" class="panel form-panel">
          <h2>新增矩阵账号</h2>
          <label>账号名称<input name="display_name" required placeholder="例如：GasGx 小白"></label>
          <label>账号编号
            <select name="account_suffix">
              <option value="auto">自动生成</option>
              <option value="01">01</option>
              <option value="02">02</option>
              <option value="03">03</option>
              <option value="04">04</option>
              <option value="05">05</option>
              <option value="06">06</option>
              <option value="07">07</option>
              <option value="08">08</option>
              <option value="09">09</option>
              <option value="10">10</option>
            </select>
          </label>
          <label>内容方向
            <select name="niche">
              <option value="短视频矩阵">短视频矩阵</option>
              <option value="产品展示">产品展示</option>
              <option value="客户线索">客户线索</option>
              <option value="品牌曝光">品牌曝光</option>
              <option value="海外分发">海外分发</option>
            </select>
          </label>
          <label>账号状态
            <select name="status">
              <option value="active">启用</option>
              <option value="warmup">养号</option>
              <option value="paused">暂停</option>
            </select>
          </label>
          <button class="btn primary" type="submit">创建账号</button>
        </form>
        <div class="panel">
          <div class="panel-head">
            <h2>账号列表</h2>
          </div>
          <div id="accounts-list" class="account-list"></div>
        </div>
      </div>
    </section>

    <section id="settings" class="view">
      <form id="distribution-settings-form" class="settings-layout">
        <section class="panel form-panel settings-common">
          <div class="panel-head">
            <div>
              <h2>全局公共配置</h2>
              <p class="muted">所有平台默认继承这里的素材目录、发布方式和上传超时。</p>
            </div>
          </div>
          <label>发布素材目录
            <input name="common.material_dir" list="material-dir-options" placeholder="runtime/materials/videos">
            <datalist id="material-dir-options">
              <option value="runtime/materials/videos"></option>
              <option value="runtime/materials/douyin"></option>
              <option value="runtime/materials/wechat"></option>
              <option value="runtime/materials/global"></option>
            </datalist>
          </label>
          <label>默认发布方式
            <select name="common.publish_mode">
              <option value="publish">立即发布</option>
              <option value="draft">保存草稿</option>
            </select>
          </label>
          <label>默认上传超时
            <select name="common.upload_timeout">
              <option value="60">60 秒</option>
              <option value="120">120 秒</option>
              <option value="180">180 秒</option>
              <option value="300">300 秒</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>平台独立配置</h2>
              <p class="muted">每个平台可以单独配置文案、权限和发布策略；视频号有额外合集和原创声明。</p>
            </div>
            <button class="btn primary" type="submit">保存全部设置</button>
          </div>
          <div id="platform-settings-list" class="platform-settings-list"></div>
          <div id="settings-save-state" class="muted"></div>
        </section>
      </form>
    </section>

    <section id="tasks" class="view">
      <div class="split">
        <form id="task-form" class="panel form-panel">
          <h2>创建任务</h2>
          <label>账号
            <select name="account_id" id="task-account-select"></select>
          </label>
          <label>平台
            <select name="platform" id="task-platform-select"></select>
          </label>
          <label>任务类型
            <select name="task_type">
              <option value="publish">自动发布</option>
              <option value="comment">自动评论</option>
              <option value="message">自动私信</option>
              <option value="stats">数据统计</option>
            </select>
          </label>
          <button class="btn primary" type="submit">加入队列</button>
        </form>
        <div class="panel">
          <div class="panel-head">
            <h2>任务记录</h2>
          </div>
          <div id="tasks-list" class="task-list"></div>
        </div>
      </div>
    </section>

    <section id="stats" class="view">
      <div class="panel">
        <div class="panel-head">
          <h2>短视频数据快照</h2>
        </div>
        <div id="stats-list" class="stats-list"></div>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
